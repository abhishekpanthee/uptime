name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  lint-and-typecheck:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Type check backend
        run: cd apps/backend && bunx tsc --noEmit

      - name: Type check frontend
        run: cd apps/frontend && bunx tsc --noEmit

      - name: Lint frontend
        run: cd apps/frontend && bun run lint

  test-backend:
    name: Backend Tests
    runs-on: ubuntu-latest
    needs: lint-and-typecheck
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run backend tests
        run: cd apps/backend && bun test
        env:
          JWT_SECRET: test-secret-for-ci
          SUPABASE_URL: http://localhost:54321
          SUPABASE_SERVICE_KEY: test-key

  build:
    name: Build Check
    runs-on: ubuntu-latest
    needs: lint-and-typecheck
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build backend
        run: cd apps/backend && bun run build

      - name: Build frontend
        run: cd apps/frontend && bun run build
        env:
          NEXT_PUBLIC_API_URL: http://localhost:8000/api

  docker:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: [test-backend, build]
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - name: Build backend image
        run: docker build -t uptime-backend ./apps/backend

      - name: Build frontend image
        run: docker build -t uptime-frontend ./apps/frontend
